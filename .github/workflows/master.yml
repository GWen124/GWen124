# Visit https://github.com/lowlighter/metrics/blob/master/action.yml for full reference
name: Metrics
on:
  # Schedule updates (each hour)
  schedule: [{cron: "0 * * * *"}]
  # Lines below let you run workflow manually and on each commit
  workflow_dispatch:
  push: {branches: ["master", "main"]}
jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - uses: lowlighter/metrics@latest
        with:
          # Your GitHub token
          token: ${{ secrets.METRICS_TOKEN }}

          # Options
          user: GWen124
          template: classic
          base: repositories, metadata
          config_timezone: Asia/Shanghai

#成绩
          #plugin_achievements: yes
          #plugin_achievements_display: detailed
          #plugin_achievements_secrets: yes
          #plugin_achievements_threshold: C

#近期活动
          #plugin_activity: yes
          #plugin_activity_days: 14
          #plugin_activity_filter: all
          #plugin_activity_limit: 5
          #plugin_activity_load: 300
          #plugin_activity_visibility: all

# Anilist 观察名单和阅读名单
          #plugin_anilist: yes
          #plugin_anilist_limit: 2
          #plugin_anilist_limit_characters: 22
          #plugin_anilist_medias: anime, manga
          #plugin_anilist_sections: favorites
          #plugin_anilist_shuffle: yes
          #plugin_anilist_user: .user.login

# 今日代码片段
          #plugin_code: yes
          #plugin_code_lines: 12
          #plugin_code_load: 100
          #plugin_code_visibility: public

# 讨论
          #plugin_discussions: yes

# 跟进问题和拉取请求
          #plugin_followup: yes
          #plugin_followup_sections: repositories

# 要点
          plugin_gists: yes

# 编码习惯
          #plugin_habits: yes
          #plugin_habits_days: 14
          #plugin_habits_facts: yes
          #plugin_habits_from: 200

# 简介
          #plugin_introduction: yes
          #plugin_introduction_title: yes

# 提交日历
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

# 最常用的语言
          plugin_languages: yes
          plugin_languages_analysis_timeout: 15
          plugin_languages_categories: markup, programming
          plugin_languages_colors: github
          plugin_languages_limit: 8
          plugin_languages_recent_categories: markup, programming
          plugin_languages_recent_days: 14
          plugin_languages_recent_load: 300
          plugin_languages_sections: most-used
          plugin_languages_threshold: 0%

# 代码行改变
          #plugin_lines: yes

# 音乐插件
          #plugin_music: yes
          #plugin_music_limit: 4
          #plugin_music_time_range: short
          #plugin_music_top_type: tracks
          #plugin_music_user: .user.login

# 夜巡
          plugin_nightscout: yes
          plugin_nightscout_datapoints: 12
          plugin_nightscout_highalert: 180
          plugin_nightscout_lowalert: 80
          plugin_nightscout_urgenthighalert: 250
          plugin_nightscout_urgentlowalert: 50
          plugin_nightscout_url: https://example.herokuapp.com

# 杰出贡献
          #plugin_notable: yes
          #plugin_notable_from: organization

# 网站表演
          #plugin_pagespeed: yes
          #plugin_pagespeed_url: .user.website

# 人物插件
          #plugin_people: yes
          #plugin_people_limit: 24
          #plugin_people_size: 28
          #plugin_people_types: followers, following

# 最近的帖子
          #plugin_posts: yes
          #plugin_posts_limit: 4
          #plugin_posts_user: .user.login

# 活跃项目
          #plugin_projects: yes
          #plugin_projects_limit: 4

# 评论反应
          #plugin_reactions: yes
          #plugin_reactions_display: absolute
          #plugin_reactions_ignored: github-actions[bot], dependabot[bot], dependabot-preview[bot]
          #plugin_reactions_limit: 200
          #plugin_reactions_limit_issues: 100

# 存储库
          plugin_repositories: 100
          plugin_repositories: yes
          plugin_repositories_affiliations: owner
          plugin_repositories_batch: 100

# RSS订阅
          #plugin_rss: yes
          #plugin_rss_limit: 4

# 网站截图
          #plugin_screenshot: yes
          #plugin_screenshot_background: yes
          #plugin_screenshot_selector: body
          #plugin_screenshot_title: Screenshot

# GitHub Skyline 3D 日历
          #plugin_skyline: yes
          #plugin_skyline_frames: 60
          #plugin_skyline_quality: 0.5
          #plugin_skyline_year: current-year

# GitHub 赞助商
          #plugin_sponsors: yes
          #plugin_sponsors_sections: goal, about

# Stackoverflow 插件
          #plugin_stackoverflow: yes
          #plugin_stackoverflow_limit: 2
          #plugin_stackoverflow_lines: 4
          #plugin_stackoverflow_lines_snippet: 2
          #plugin_stackoverflow_sections: answers-top, questions-recent

# 过去几周的观星者
          #plugin_stargazers: yes

# 最近加星的仓库
          #plugin_stars: yes
          #plugin_stars_limit: 4

# 股价
          #plugin_stock: yes
          #plugin_stock_duration: 1d
          #plugin_stock_interval: 5m

# GitHub 社区支持
          #plugin_support: yes

# 已加星标的话题
          #plugin_topics: yes
          #plugin_topics_limit: 15
          #plugin_topics_mode: starred
          #plugin_topics_sort: stars

# 仓库流量
          #plugin_traffic: yes

# 最新推文
          #plugin_tweets: yes
          #plugin_tweets_limit: 2
          #plugin_tweets_user: .user.twitter

# WakaTime 插件
          #plugin_wakatime: yes
          #plugin_wakatime_days: 7
          #plugin_wakatime_limit: 5
          #plugin_wakatime_sections: time, projects, projects-graphs, languages, languages-graphs, editors, os
          #plugin_wakatime_url: https://wakatime.com
          #plugin_wakatime_user: current